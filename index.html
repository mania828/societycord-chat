<!DOCTYPE html>
<html>
<head>
<title>SocietyCord</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body style="background:#0b0b10;color:white;font-family:Arial">

<h2 style="color:#c084fc">SocietyCord</h2>

<div id="chat" style="height:400px;overflow:auto;border:1px solid #333;padding:10px;background:#151522"></div>

<br>

<input id="msg" style="width:80%;padding:10px;background:#111;border:1px solid #333;color:white">
<button onclick="send()" style="padding:10px;background:#7c3aed;color:white;border:none">Send</button>

<script>
const socket = io();

socket.on("msg", (msg) => {
    document.getElementById("chat").innerHTML += "<div>" + msg + "</div>";
});

function send() {
    const input = document.getElementById("msg");
    socket.emit("msg", input.value);
    input.value = "";
}
</script>

</body>
</html>
